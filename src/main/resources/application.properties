spring.application.name=SpotRacer
server.port=8081

spring.datasource.url=jdbc:postgresql://db:5432/myapp
spring.datasource.username=myapp
spring.datasource.password=myapp

spring.mail.host=localhost
spring.mail.port=1025
spring.mail.username=
spring.mail.password=

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.hibernate.naming.physical-strategy=pl.net.karion.SpotRacer.config.TablePrefixNamingStrategy

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

springdoc.swagger-ui.path=/swagger
springdoc.api-docs.path=/api/docs